<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>Nutri PWA</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="shortcut icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
<div class="app">
  <header>
    <div class="bar">
      <div class="title">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2a10 10 0 1 0 10 10h-3A7 7 0 1 1 12 5V2z" fill="currentColor"/></svg>
        Nutri PWA
      </div>
      <div class="grow"></div>
      <button id="themeBtn" class="btn small" title="Toggle theme" aria-label="Toggle theme"></button>
      <button id="installBtn" class="btn small hidden">Install</button>
    </div>
    <nav class="tabs">
      <div class="tab active" data-page="meals">Meals</div>
      <div class="tab" data-page="foods">Foods</div>
      <div class="tab" data-page="goals">Goals</div>
    </nav>
  </header>

  <main id="page-meals" class="grid mode-overview">
    <div class="subheader" id="mealsSubHeader">
      <div class="dayBox inactive" id="prevDayBox" role="button" aria-label="Previous day" tabindex="0"></div>
      <div class="dayDisplay" id="dayLabel" data-iso=""></div>
      <div class="dayBox inactive" id="nextDayBox" role="button" aria-label="Next day" tabindex="0"></div>
    </div>

    <section class="totals" id="dayTotals" aria-live="polite"></section>

    <section class="card" id="quickAddCard">
      <div class="field">
        <label for="quickSearch">Add meal — search foods</label>
        <input id="quickSearch" placeholder="e.g., chicken breast, rice, apple" autocomplete="off" />
      </div>
      <div id="quickList" class="list" style="margin-top:10px"></div>
    </section>

    <section id="mealsCard">
      <div id="mealsList" class="meals-list"></div>
    </section>
  </main>

  <main id="page-foods" class="grid hidden">
    <section class="card grid cols-2">
      <form id="foodForm" class="grid" autocomplete="off">
        <div class="row"><strong id="foodFormTitle">Add food</strong><span class="muted" id="foodUpdated"></span></div>
        <input type="hidden" id="foodId" />
        <div class="field"><label>Name</label><input id="foodName" required /></div>
        <div class="field"><label>Reference portion (label, e.g. 100 g, 1 slice)</label><input id="foodRefLabel" placeholder="e.g. 100 g" required/></div>
        <div class="grid cols-4">
          <div class="field"><label>kcal</label><input id="foodKcal" type="number" min="0" step="1" required/></div>
          <div class="field"><label>Prot (g)</label><input id="foodProt" type="number" min="0" step="0.1" required/></div>
          <div class="field"><label>Carbs (g)</label><input id="foodCarb" type="number" min="0" step="0.1" required/></div>
          <div class="field"><label>Fat (g)</label><input id="foodFat" type="number" min="0" step="0.1" required/></div>
        </div>
        <div class="row">
          <button class="btn primary" id="saveFoodBtn" type="submit">Save</button>
          <button class="btn" id="resetFoodBtn" type="button">Clear</button>
          <span id="foodFormMsg" class="muted" style="margin-left:8px"></span>
        </div>
      </form>

      <div>
        <div class="row">
          <div class="field grow"><label>Search</label><input id="foodSearch" placeholder="Filter foods" /></div>
          <div class="field" style="min-width:160px">
            <label>Status</label>
            <select id="foodStatus">
              <option value="active">Active</option>
              <option value="archived">Archived</option>
              <option value="all">All</option>
            </select>
          </div>
        </div>
        <div id="foodsList" class="list" style="margin-top:8px"></div>
      </div>
    </section>
  </main>

  <main id="page-goals" class="grid hidden">
    <section class="card" id="goalsCard" data-testid="goalsCard"></section>
    <section class="card" id="heatmapCard" data-testid="heatmapCard"></section>
  </main>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
