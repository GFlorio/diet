<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>Nutri PWA</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%230ea5e9' d='M12 2a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V2z'/%3E%3Cpath fill='%230ea5e9' d='M12 6a5 5 0 0 0-5 5h2a3 3 0 1 1 3 3v2a5 5 0 0 0 0-10z'/%3E%3C/svg%3E" />
  <style>
    :root{
      --bg: #0b1220; --fg: #e6edf3; --muted:#9fb3c8; --card:#0f172a; --brand:#0ea5e9; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --border:#22304a; --shadow: 0 10px 20px rgba(0,0,0,.25);
    }
    @media (prefers-color-scheme: light){
      :root{ --bg:#f7fafc; --fg:#0f172a; --muted:#475569; --card:#ffffff; --border:#e2e8f0; --shadow:0 10px 20px rgba(2,6,23,.06); }
    }
    [data-theme="light"]:root{ --bg:#f7fafc; --fg:#0f172a; --muted:#475569; --card:#ffffff; --border:#e2e8f0; --shadow:0 10px 20px rgba(2,6,23,.06); }
    [data-theme="dark"]:root{ --bg:#0b1220; --fg:#e6edf3; --muted:#9fb3c8; --card:#0f172a; --border:#22304a; --shadow:0 10px 20px rgba(0,0,0,.25); }

    *{ box-sizing:border-box }
    html,body{ height:100% }
    body{ margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji"; background:var(--bg); color:var(--fg) }
    .app{ max-width:960px; margin:0 auto; padding: 8px 12px 64px }

    header{ position:sticky; top:0; z-index:50; backdrop-filter:saturate(150%) blur(8px); background: color-mix(in oklab, var(--bg) 80%, transparent); border-bottom:1px solid var(--border); }
    .bar{ display:flex; align-items:center; gap:8px; padding:10px 8px; }
    .title{ font-size:18px; font-weight:700; letter-spacing:.2px; display:flex; align-items:center; gap:8px }
    .title svg{ width:22px; height:22px }
    .grow{ flex:1 }

    .btn{ display:inline-flex; align-items:center; gap:6px; padding:8px 10px; border:1px solid var(--border); background:var(--card); color:var(--fg); border-radius:12px; cursor:pointer; box-shadow:var(--shadow); user-select:none }
    .btn:active{ transform:translateY(1px) }
    .btn.primary{ background:var(--brand); border-color:var(--brand); color:white }
    .btn.ghost{ background:transparent; box-shadow:none }
    .btn.small{ padding:6px 8px; border-radius:10px; font-size:12px }

    nav.tabs{ display:flex; gap:8px; padding:8px; border-bottom:1px dashed var(--border) }
    nav.tabs .tab{ flex:1; text-align:center; padding:10px; border:1px solid var(--border); border-radius:12px; background:var(--card); cursor:pointer; user-select:none }
    nav.tabs .tab.active{ outline:2px solid var(--brand) }

    .grid{ display:grid; gap:12px }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; box-shadow:var(--shadow) }
    .row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap }
    .row.nowrap{ flex-wrap:nowrap }
    .muted{ color:var(--muted) }
    .right{ margin-left:auto }

    input, select{ width:100%; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:transparent; color:inherit }
    input[type="date"]{ padding:9px 10px }
    input[type="number"]{ -moz-appearance:textfield }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button{ -webkit-appearance: none; margin: 0; }
    label{ font-size:12px; color:var(--muted) }
    .field{ display:grid; gap:6px }

    .list{ display:grid; gap:8px }
    .item{ display:grid; grid-template-columns: 1fr auto; gap:8px; align-items:center; border:1px dashed var(--border); border-radius:12px; padding:10px }
    .item .meta{ font-size:12px; color:var(--muted) }
    .chips{ display:flex; gap:6px; flex-wrap:wrap }
    .chip{ font-size:12px; padding:4px 6px; border:1px solid var(--border); border-radius:10px }

    .actions{ display:flex; gap:6px; align-items:center }

    .hidden{ display:none !important }

    /* Responsive */
    @media (min-width: 720px){ .grid.cols-2{ grid-template-columns: 1fr 1fr } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="bar">
      <div class="title">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 2a10 10 0 1 0 10 10h-3A7 7 0 1 1 12 5V2z" fill="currentColor"/></svg>
        Nutri PWA
      </div>
      <div class="grow"></div>
      <button id="themeBtn" class="btn small" title="Toggle theme" aria-label="Toggle theme"></button>
      <button id="installBtn" class="btn small hidden">Install</button>
    </div>
    <nav class="tabs">
      <div class="tab active" data-page="meals">Meals</div>
      <div class="tab" data-page="foods">Foods</div>
      <div class="tab" data-page="report">Report</div>
    </nav>
  </header>

  <main id="page-meals" class="grid">
    <section class="card">
      <div class="row nowrap">
        <div class="field" style="min-width:180px; max-width:220px">
          <label for="mealDate">Date</label>
          <input type="date" id="mealDate" />
        </div>
        <div class="field grow">
          <label for="quickSearch">Quick add meal — search foods</label>
          <input id="quickSearch" placeholder="e.g., chicken breast, rice, apple" autocomplete="off" />
        </div>
      </div>
      <div id="quickList" class="list" style="margin-top:10px"></div>
    </section>

    <section class="card">
      <div class="row">
        <strong>Meals for <span id="dayLabel"></span></strong>
        <span class="muted" id="mealsInfo"></span>
      </div>
      <div id="mealsList" class="list" style="margin-top:8px"></div>
    </section>
  </main>

  <main id="page-foods" class="grid hidden">
    <section class="card grid cols-2">
      <form id="foodForm" class="grid" autocomplete="off">
        <div class="row"><strong id="foodFormTitle">Add food</strong><span class="muted" id="foodUpdated"></span></div>
        <input type="hidden" id="foodId" />
        <div class="field"><label>Name</label><input id="foodName" required /></div>
        <div class="field"><label>Reference portion (label, e.g. 100 g, 1 slice)</label><input id="foodRefLabel" placeholder="e.g. 100 g" required/></div>
        <div class="grid cols-2">
          <div class="field"><label>Calories / portion</label><input id="foodKcal" type="number" min="0" step="1" required/></div>
          <div class="field"><label>Protein (g)</label><input id="foodProt" type="number" min="0" step="0.1" required/></div>
          <div class="field"><label>Carbs (g)</label><input id="foodCarb" type="number" min="0" step="0.1" required/></div>
          <div class="field"><label>Fat (g)</label><input id="foodFat" type="number" min="0" step="0.1" required/></div>
        </div>
        <div class="row">
          <button class="btn primary" id="saveFoodBtn" type="submit">Save</button>
          <button class="btn" id="resetFoodBtn" type="button">Clear</button>
          <span class="right muted" id="foodFormHint">Tip: use this form to add or edit foods. Archiving hides foods without breaking past meals.</span>
        </div>
      </form>

      <div>
        <div class="row">
          <div class="field grow"><label>Search</label><input id="foodSearch" placeholder="Filter foods" /></div>
          <div class="field" style="min-width:160px">
            <label>Status</label>
            <select id="foodStatus">
              <option value="active">Active</option>
              <option value="archived">Archived</option>
              <option value="all">All</option>
            </select>
          </div>
        </div>
        <div id="foodsList" class="list" style="margin-top:8px"></div>
      </div>
    </section>
  </main>

  <main id="page-report" class="grid hidden">
    <section class="card">
      <div class="row">
        <div class="field"><label>From</label><input type="date" id="repFrom"></div>
        <div class="field"><label>To</label><input type="date" id="repTo"></div>
        <div class="row right" style="align-items:flex-end"><button class="btn" id="repRefresh">Refresh</button></div>
      </div>
      <div id="repTable" style="margin-top:10px"></div>
    </section>
  </main>
</div>

<script>
(() => {
  // ===== Utilities =====
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
  const fmtNum = (n, d=1) => Number(n).toFixed(d).replace(/\.0+$/,'');
  const isoToday = () => new Date().toISOString().slice(0,10);
  const toISO = (d) => new Date(d).toISOString().slice(0,10);
  const now = () => Date.now();
  const by = (k) => (a,b) => (a[k] > b[k] ? 1 : a[k] < b[k] ? -1 : 0);
  const esc = (s='') => (''+s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

  // ===== Theme Toggle =====
  const themeBtn = $('#themeBtn');
  const getStoredTheme = () => localStorage.getItem('theme')||'auto';
  const applyTheme = (t) => { document.documentElement.setAttribute('data-theme', t); themeBtn.textContent = t==='dark' ? '🌙' : t==='light' ? '☀️' : '🌓'; };
  themeBtn.addEventListener('click', () => {
    const cur = getStoredTheme();
    const next = cur==='auto' ? 'light' : cur==='light' ? 'dark' : 'auto';
    localStorage.setItem('theme', next); applyTheme(next);
  });
  applyTheme(getStoredTheme());

  // ===== Nav =====
  $$('.tab').forEach(tab=>tab.addEventListener('click', () => {
    $$('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const page = tab.dataset.page;
    ['meals','foods','report'].forEach(p=>$('#page-'+p).classList.toggle('hidden', p!==page));
  }));

  // ===== IndexedDB (tiny helper) =====
  let db;
  const DB_NAME = 'nutri-pwa';
  const DB_VER = 1;
  const openDB = () => new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('foods')){
        const s = db.createObjectStore('foods', { keyPath:'id', autoIncrement:true });
        s.createIndex('by_name', 'name', { unique:false });
        s.createIndex('by_archived', 'archived', { unique:false });
        s.createIndex('by_updatedAt', 'updatedAt', { unique:false });
      }
      if (!db.objectStoreNames.contains('meals')){
        const s = db.createObjectStore('meals', { keyPath:'id', autoIncrement:true });
        s.createIndex('by_date', 'date', { unique:false });
        s.createIndex('by_foodId', 'foodId', { unique:false });
        s.createIndex('by_updatedAt', 'updatedAt', { unique:false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  const txWrap = (stores, mode, fn) => new Promise(async (resolve, reject) => {
    if (!db) db = await openDB();
    const tx = db.transaction(stores, mode);
    const store = stores.length===1 ? tx.objectStore(stores[0]) : null;
    fn(tx, store);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
    tx.onabort = () => reject(tx.error);
  });
  const getAll = (storeName, index, query) => new Promise(async (resolve, reject) => {
    if (!db) db = await openDB();
    const tx = db.transaction([storeName], 'readonly');
    const store = tx.objectStore(storeName);
    const src = index ? store.index(index) : store;
    const req = query ? src.getAll(query) : src.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  const getWhere = (storeName, pred) => new Promise(async (resolve, reject) => {
    if (!db) db = await openDB();
    const tx = db.transaction([storeName], 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.openCursor();
    const out = [];
    req.onsuccess = () => {
      const cur = req.result; if (!cur){ resolve(out); return; }
      if (pred(cur.value)) out.push(cur.value);
      cur.continue();
    };
    req.onerror = () => reject(req.error);
  });
  const put = (storeName, val) => new Promise(async (resolve, reject) => {
    if (!db) db = await openDB();
    const tx = db.transaction([storeName], 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(val);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  const del = (storeName, key) => txWrap([storeName], 'readwrite', (tx, s)=>s.delete(key));
  const get = (storeName, key) => new Promise(async (resolve, reject) => {
    if (!db) db = await openDB();
    const tx = db.transaction([storeName], 'readonly');
    const s = tx.objectStore(storeName);
    const req = s.get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });

  // ===== Data ops =====
  const Foods = {
    async list({ search='', status='active' }={}){
      const all = await getAll('foods');
      let xs = all.sort(by('name'));
      if (status==='active') xs = xs.filter(f=>!f.archived);
      if (status==='archived') xs = xs.filter(f=>!!f.archived);
      if (search){
        const q = search.trim().toLowerCase();
        xs = xs.filter(f => (f.name+ ' ' + f.refLabel).toLowerCase().includes(q));
      }
      return xs;
    },
    async create({ name, refLabel, kcal, p, c, f }){
      const t = now();
      const food = { name: name.trim(), refLabel: refLabel.trim(), kcal:+kcal, p:+p, c:+c, f:+f, archived:false, createdAt:t, updatedAt:t };
      food.id = await put('foods', food); return food;
    },
    async update(id, patch){
      const cur = await get('foods', id); if (!cur) return;
      const next = { ...cur, ...patch, updatedAt: now() };
      await put('foods', next); return next;
    },
    async setArchived(id, archived){ return this.update(id, { archived: !!archived }); },
    async byId(id){ return get('foods', id); },
  };

  const Meals = {
    async listByDate(dateISO){
      const all = await getAll('meals');
      return all.filter(m=>m.date===dateISO).sort((a,b)=>a.id-b.id);
    },
    async create({ food, multiplier, date }){
      const t = now();
      const meal = {
        foodId: food.id,
        foodSnapshot: { id: food.id, name: food.name, refLabel: food.refLabel, kcal: food.kcal, p: food.p, c: food.c, f: food.f, updatedAt: food.updatedAt },
        multiplier: +multiplier || 1,
        date,
        createdAt: t,
        updatedAt: t,
      };
      meal.id = await put('meals', meal); return meal;
    },
    async update(id, patch){
      const cur = await get('meals', id); if (!cur) return;
      const next = { ...cur, ...patch, updatedAt: now() };
      await put('meals', next); return next;
    },
    async remove(id){ await del('meals', id); },
    // Bring a meal's snapshot up-to-date with the current food values
    async syncMealToFood(meal){
      const food = await Foods.byId(meal.foodId); if (!food) return meal;
      if ((meal.foodSnapshot?.updatedAt||0) >= food.updatedAt) return meal; // already up-to-date
      return Meals.update(meal.id, { foodSnapshot: { id: food.id, name: food.name, refLabel: food.refLabel, kcal: food.kcal, p: food.p, c: food.c, f: food.f, updatedAt: food.updatedAt } });
    },
    async syncAllForFood(foodId){
      const xs = await getWhere('meals', m=>m.foodId===foodId && (m.foodSnapshot?.updatedAt||0) < (m.foodUpdatedAt||0));
      // corrected logic: fetch all by foodId, then update if snapshot older than food.updatedAt
      const all = await getWhere('meals', m=>m.foodId===foodId);
      const food = await Foods.byId(foodId); if (!food) return 0;
      let count = 0;
      for (const m of all){
        if ((m.foodSnapshot?.updatedAt||0) < food.updatedAt){ await this.syncMealToFood(m); count++; }
      }
      return count;
    }
  };

  // ===== PWA install prompt =====
  let deferredPrompt; const installBtn = $('#installBtn');
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.classList.remove('hidden'); });
  installBtn.addEventListener('click', async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome) installBtn.classList.add('hidden'); deferredPrompt = null; });

  // ===== Service worker =====
  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(console.error));
  }

  // ===== Meals UI =====
  const mealDate = $('#mealDate');
  const dayLabel = $('#dayLabel');
  const mealsList = $('#mealsList');
  const mealsInfo = $('#mealsInfo');
  const quickSearch = $('#quickSearch');
  const quickList = $('#quickList');

  mealDate.value = isoToday();
  dayLabel.textContent = mealDate.value;
  mealDate.addEventListener('change', ()=>{ dayLabel.textContent = mealDate.value; renderMeals(); });

  async function renderQuickList(){
    const q = quickSearch.value.trim();
    const foods = await Foods.list({ search: q, status: 'active' });
    quickList.innerHTML = foods.slice(0, 40).map(f=>`
      <div class="item" data-id="${f.id}">
        <div>
          <div><strong>${esc(f.name)}</strong></div>
          <div class="meta">${esc(f.refLabel)} · ${fmtNum(f.kcal,0)} kcal · P${fmtNum(f.p)} C${fmtNum(f.c)} F${fmtNum(f.f)}</div>
        </div>
        <div class="actions">
          <input type="number" inputmode="decimal" step="0.5" min="0" value="1" class="qty" title="Qty (×ref portion)" style="width:80px" />
          <button class="btn small add">＋ Add</button>
          <button class="btn small ghost add05">+0.5</button>
          <button class="btn small ghost add1">+1</button>
          <button class="btn small ghost editFood" title="Edit food">✏️</button>
        </div>
      </div>`).join('') || `<div class="muted">No foods yet. Type a name and <a href="#" id="quickNew">create it</a>.</div>`;
    const createLink = $('#quickNew');
    if (createLink){ createLink.addEventListener('click', (e)=>{ e.preventDefault(); goFoodsWithPrefill(q); }); }
  }
  quickSearch.addEventListener('input', renderQuickList);
  quickSearch.addEventListener('keydown', (e)=>{ if (e.key==='Enter'){ const first = quickList.querySelector('.item'); if (first){ first.querySelector('.add').click(); e.preventDefault(); } }});

  quickList.addEventListener('click', async (e) => {
    const item = e.target.closest('.item'); if (!item) return;
    const id = +item.dataset.id; const food = await Foods.byId(id); if (!food) return;
    const qtyEl = item.querySelector('.qty');
    if (e.target.classList.contains('add') || e.target.classList.contains('add1')){
      const qty = Number(qtyEl.value||1); await Meals.create({ food, multiplier: qty, date: mealDate.value }); qtyEl.value = 1; renderMeals(); return;
    }
    if (e.target.classList.contains('add05')){ qtyEl.value = Number(qtyEl.value||1) + 0.5; return; }
    if (e.target.classList.contains('editFood')){ goFoodsWithPrefill(food.name); return; }
  });

  async function renderMeals(){
    const xs = await Meals.listByDate(mealDate.value);
    const count = xs.length;
    const totals = xs.reduce((a,m)=>{ a.k+=m.foodSnapshot.kcal*m.multiplier; a.p+=m.foodSnapshot.p*m.multiplier; a.c+=m.foodSnapshot.c*m.multiplier; a.f+=m.foodSnapshot.f*m.multiplier; return a; }, {k:0,p:0,c:0,f:0});
    mealsInfo.textContent = count ? `${count} meal${count>1?'s':''} · ${fmtNum(totals.k,0)} kcal · P${fmtNum(totals.p)} C${fmtNum(totals.c)} F${fmtNum(totals.f)}` : 'No meals yet';
    mealsList.innerHTML = xs.map(m=>{
      const outdated = (m.foodSnapshot?.updatedAt||0) < (m.foodUpdatedAt||0); // kept for forward compat
      return `<div class="item" data-id="${m.id}">
        <div>
          <div><strong>${esc(m.foodSnapshot.name)}</strong> <span class="chip">×${fmtNum(m.multiplier)}</span></div>
          <div class="meta">${esc(m.foodSnapshot.refLabel)} · ${fmtNum(m.foodSnapshot.kcal*m.multiplier,0)} kcal · P${fmtNum(m.foodSnapshot.p*m.multiplier)} C${fmtNum(m.foodSnapshot.c*m.multiplier)} F${fmtNum(m.foodSnapshot.f*m.multiplier)}</div>
        </div>
        <div class="actions">
          <button class="btn small ghost qtyMinus" title="-0.5">−0.5</button>
          <button class="btn small ghost qtyPlus" title="+0.5">+0.5</button>
          <button class="btn small ghost sync" title="Update to latest food">⟳</button>
          <button class="btn small ghost del" title="Delete">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }
  mealsList.addEventListener('click', async (e) => {
    const row = e.target.closest('.item'); if (!row) return; const id = +row.dataset.id; const meal = (await Meals.listByDate(mealDate.value)).find(m=>m.id===id);
    if (!meal) return;
    if (e.target.classList.contains('del')){ await Meals.remove(meal.id); renderMeals(); return; }
    if (e.target.classList.contains('qtyPlus')){ await Meals.update(meal.id, { multiplier: +(meal.multiplier + 0.5).toFixed(2) }); renderMeals(); return; }
    if (e.target.classList.contains('qtyMinus')){ const v = Math.max(0, meal.multiplier - 0.5); if (v===0){ await Meals.remove(meal.id); } else { await Meals.update(meal.id, { multiplier: +v.toFixed(2) }); } renderMeals(); return; }
    if (e.target.classList.contains('sync')){ await Meals.syncMealToFood(meal); renderMeals(); return; }
  });

  // ===== Foods UI =====
  const foodForm = $('#foodForm');
  const foodFormTitle = $('#foodFormTitle');
  const foodUpdated = $('#foodUpdated');
  const foodId = $('#foodId');
  const foodName = $('#foodName');
  const foodRefLabel = $('#foodRefLabel');
  const foodKcal = $('#foodKcal');
  const foodProt = $('#foodProt');
  const foodCarb = $('#foodCarb');
  const foodFat = $('#foodFat');
  const resetFoodBtn = $('#resetFoodBtn');
  const foodsList = $('#foodsList');
  const foodSearch = $('#foodSearch');
  const foodStatus = $('#foodStatus');

  resetFoodBtn.addEventListener('click', ()=> setFoodForm());

  function setFoodForm(f){
    if (!f){
      foodFormTitle.textContent = 'Add food'; foodUpdated.textContent='';
      foodId.value=''; foodName.value=''; foodRefLabel.value=''; foodKcal.value=''; foodProt.value=''; foodCarb.value=''; foodFat.value='';
    } else {
      foodFormTitle.textContent = 'Edit food'; foodUpdated.textContent = `updated ${new Date(f.updatedAt).toLocaleString()}`;
      foodId.value = f.id; foodName.value=f.name; foodRefLabel.value=f.refLabel; foodKcal.value=f.kcal; foodProt.value=f.p; foodCarb.value=f.c; foodFat.value=f.f;
    }
  }

  async function renderFoods(){
    const xs = await Foods.list({ search: foodSearch.value, status: foodStatus.value });
    foodsList.innerHTML = xs.map(f=>`
      <div class="item" data-id="${f.id}">
        <div>
          <div><strong>${esc(f.name)}</strong> ${f.archived?'<span class="chip">Archived</span>':''}</div>
          <div class="meta">${esc(f.refLabel)} · ${fmtNum(f.kcal,0)} kcal · P${fmtNum(f.p)} C${fmtNum(f.c)} F${fmtNum(f.f)}</div>
        </div>
        <div class="actions">
          <button class="btn small ghost edit">✏️ Edit</button>
          <button class="btn small ghost ${f.archived?'unarchive':'archive'}">${f.archived?'📦 Unarchive':'📦 Archive'}</button>
          <button class="btn small ghost updateMeals" title="Update past meals to latest">⟳ Update meals</button>
        </div>
      </div>`).join('') || `<div class="muted">No foods yet.</div>`;
  }
  foodsList.addEventListener('click', async (e) => {
    const row = e.target.closest('.item'); if (!row) return; const id = +row.dataset.id; const f = await Foods.byId(id);
    if (e.target.classList.contains('edit')){ setFoodForm(f); window.scrollTo({top:0, behavior:'smooth'}); return; }
    if (e.target.classList.contains('archive')){ await Foods.setArchived(id, true); renderFoods(); renderQuickList(); return; }
    if (e.target.classList.contains('unarchive')){ await Foods.setArchived(id, false); renderFoods(); renderQuickList(); return; }
    if (e.target.classList.contains('updateMeals')){ const n = await Meals.syncAllForFood(id); alert(`Updated ${n} meal(s) using this food.`); renderMeals(); return; }
  });
  foodSearch.addEventListener('input', renderFoods);
  foodStatus.addEventListener('change', renderFoods);

  foodForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = { name:foodName.value, refLabel:foodRefLabel.value, kcal:+foodKcal.value, p:+foodProt.value, c:+foodCarb.value, f:+foodFat.value };
    if (foodId.value){ await Foods.update(+foodId.value, payload); } else { await Foods.create(payload); }
    setFoodForm(); renderFoods(); renderQuickList();
  });

  function goFoodsWithPrefill(name){
    $$('.tab').forEach(t=>t.classList.remove('active')); $$('.tab').find(t=>t.dataset.page==='foods').classList.add('active');
    ['meals','foods','report'].forEach(p=>$('#page-'+p).classList.toggle('hidden', p!=='foods'));
    setFoodForm(); foodName.value = name || ''; foodName.focus();
  }

  // ===== Report UI =====
  const repFrom = $('#repFrom'); const repTo = $('#repTo'); const repRefresh = $('#repRefresh'); const repTable = $('#repTable');
  const shiftDay = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate()+n); return toISO(dt); };
  repTo.value = isoToday(); repFrom.value = shiftDay(repTo.value, -6);
  repRefresh.addEventListener('click', renderReport);

  async function renderReport(){
    const from = repFrom.value; const to = repTo.value; if (!from||!to) return;
    if (from>to){ alert('Invalid range'); return; }
    // collect meals in range
    const all = await getAll('meals');
    const inRange = all.filter(m=>m.date>=from && m.date<=to);
    const days = {};
    for (const m of inRange){
      const k = m.date; const s = m.foodSnapshot; const q = m.multiplier;
      if (!days[k]) days[k] = { k:0, p:0, c:0, f:0 };
      days[k].k += s.kcal*q; days[k].p += s.p*q; days[k].c += s.c*q; days[k].f += s.f*q;
    }
    const rows = Object.entries(days).sort((a,b)=>a[0]<b[0]?-1:1);
    repTable.innerHTML = `
      <div class="item" style="grid-template-columns: 1fr 80px 80px 80px 80px">
        <strong>Day</strong><strong class="right">kcal</strong><strong class="right">P</strong><strong class="right">C</strong><strong class="right">F</strong>
      </div>
      ${rows.map(([d,t])=>`
       <div class="item" style="grid-template-columns: 1fr 80px 80px 80px 80px">
         <div>${d}</div>
         <div class="right">${fmtNum(t.k,0)}</div>
         <div class="right">${fmtNum(t.p)}</div>
         <div class="right">${fmtNum(t.c)}</div>
         <div class="right">${fmtNum(t.f)}</div>
       </div>`).join('') || '<div class="muted">No meals in range.</div>'}
    `;
  }

  // ===== Init =====
  (async function init(){
    await openDB();
    quickSearch.value = '';
    await renderQuickList();
    await renderMeals();
    await renderFoods();
    await renderReport();
  })();
})();
</script>
</body>
</html>
