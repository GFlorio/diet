<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>Diet</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="shortcut icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
<div class="app">
  <header>
    <nav class="tabs">
      <div class="tab active" data-page="meals">Meals</div>
      <div class="tab" data-page="foods">Foods</div>
      <div class="tab" data-page="goals">Goals</div>
      <button type="button" id="configBtn" class="btn small" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm7.43-2.47c.04-.32.07-.64.07-.97s-.03-.66-.07-1l2.16-1.68a.5.5 0 0 0 .12-.64l-2.05-3.54a.5.5 0 0 0-.61-.22l-2.54 1.03c-.53-.41-1.1-.75-1.72-1l-.38-2.7A.49.49 0 0 0 13.68 2H9.58a.49.49 0 0 0-.49.43l-.38 2.7c-.63.25-1.2.6-1.73 1L4.44 5.1a.49.49 0 0 0-.61.22L1.78 8.86a.49.49 0 0 0 .12.64l2.16 1.68a7.2 7.2 0 0 0-.07 1c0 .33.03.66.07.97L1.9 14.83a.5.5 0 0 0-.12.64l2.05 3.54a.5.5 0 0 0 .61.22l2.54-1.03c.53.41 1.1.75 1.72 1l.38 2.7c.05.25.27.43.5.43h4.1c.24 0 .44-.18.49-.43l.38-2.7c.63-.25 1.2-.6 1.73-1l2.54 1.03c.24.09.5-.01.61-.22l2.05-3.54a.5.5 0 0 0-.12-.64l-2.16-1.68z"/></svg>
      </button>
    </nav>
  </header>

  <dialog id="configModal" aria-label="Settings">
    <div class="config-inner">
      <div class="config-header">
        <span class="config-title">Settings</span>
        <button type="button" class="btn ghost config-close" id="configModalClose" aria-label="Close settings">✕</button>
      </div>
      <div class="config-section">
        <div class="config-label">Theme</div>
        <div class="config-theme-row">
          <button type="button" class="btn config-theme-btn" data-theme="auto">Auto</button>
          <button type="button" class="btn config-theme-btn" data-theme="light">Light</button>
          <button type="button" class="btn config-theme-btn" data-theme="dark">Dark</button>
        </div>
      </div>
      <div class="config-section">
        <div class="config-label">Status</div>
        <div class="config-status-list">
          <div class="config-status-row" id="statusPWA">
            <span class="status-dot" aria-hidden="true"></span>
            <span>PWA Installed</span>
            <button type="button" class="btn small hidden" id="installPWABtn">Install</button>
            <span class="config-status-note hidden" id="installPWANote">Use browser menu</span>
          </div>
          <div class="config-status-row" id="statusStorage">
            <span class="status-dot" aria-hidden="true"></span>
            <span>Persistent Storage</span>
          </div>
          <div class="config-status-row" id="statusSW">
            <span class="status-dot" aria-hidden="true"></span>
            <span>Offline Ready</span>
          </div>
          <div class="config-status-row" id="statusSync">
            <span class="status-dot bad" aria-hidden="true"></span>
            <span>Remote Sync</span>
            <span class="config-status-note">Not configured</span>
          </div>
        </div>
      </div>
      <details class="config-danger-details">
        <summary class="config-danger-summary">Danger Zone</summary>
        <div class="config-danger-body">
          <button type="button" class="btn danger" id="resetDBBtn">Delete all data</button>
          <span class="config-danger-note">Permanently deletes all foods, meals, and goals.</span>
        </div>
      </details>
    </div>
  </dialog>

  <main id="page-meals" class="grid mode-overview">
    <div class="subheader" id="mealsSubHeader">
      <div class="dayBox inactive" id="prevDayBox" role="button" aria-label="Previous day" tabindex="0"></div>
      <div class="dayDisplay" id="dayLabel" data-iso=""></div>
      <div class="dayBox inactive" id="nextDayBox" role="button" aria-label="Next day" tabindex="0"></div>
    </div>

    <section class="totals" id="dayTotals" aria-live="polite"></section>

    <section class="card" id="quickAddCard">
      <div class="field">
        <label for="quickSearch">Add meal — search foods</label>
        <input id="quickSearch" placeholder="e.g., chicken breast, rice, apple" autocomplete="off" />
      </div>
      <div id="quickList" class="list" style="margin-top:10px"></div>
    </section>

    <section id="mealsCard">
      <div id="mealsList" class="meals-list"></div>
    </section>
  </main>

  <main id="page-foods" class="grid hidden">
    <section class="card grid cols-2">
      <form id="foodForm" class="grid" autocomplete="off">
        <div class="row"><strong id="foodFormTitle">Add food</strong><span class="muted" id="foodUpdated"></span></div>
        <input type="hidden" id="foodId" />
        <div class="field"><label>Name</label><input id="foodName" required /></div>
        <div class="field"><label>Reference portion (label, e.g. 100 g, 1 slice)</label><input id="foodRefLabel" placeholder="e.g. 100 g" required/></div>
        <div class="grid cols-4">
          <div class="field"><label>kcal</label><input id="foodKcal" type="number" min="0" step="1" required/></div>
          <div class="field"><label>Prot (g)</label><input id="foodProt" type="number" min="0" step="0.1" required/></div>
          <div class="field"><label>Carbs (g)</label><input id="foodCarb" type="number" min="0" step="0.1" required/></div>
          <div class="field"><label>Fat (g)</label><input id="foodFat" type="number" min="0" step="0.1" required/></div>
        </div>
        <div class="row">
          <button class="btn primary" id="saveFoodBtn" type="submit">Save</button>
          <button class="btn" id="resetFoodBtn" type="button">Clear</button>
          <span id="foodFormMsg" class="muted" style="margin-left:8px"></span>
        </div>
      </form>

      <div>
        <div class="row">
          <div class="field grow"><label>Search</label><input id="foodSearch" placeholder="Filter foods" /></div>
          <div class="field" style="min-width:160px">
            <label>Status</label>
            <select id="foodStatus">
              <option value="active">Active</option>
              <option value="archived">Archived</option>
              <option value="all">All</option>
            </select>
          </div>
        </div>
        <div id="foodsList" class="list" style="margin-top:8px"></div>
      </div>
    </section>
  </main>

  <main id="page-goals" class="grid hidden">
    <section class="card" id="goalsCard" data-testid="goalsCard"></section>
    <section class="card" id="heatmapCard" data-testid="heatmapCard"></section>
  </main>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
