[tools]
# Core runtimes / CLIs
node = "24"
uv = "latest"

# Environment variables (kept minimal here; add more as needed)
[env]
GOFLAGS = "-trimpath"
NODE_ENV = "development"
_.path = ["{{config_root}}/node_modules/.bin", "{{config_root}}/frontend/node_modules/.bin"]

# Tasks – run with `mise run <task>`
[tasks]

# ----- Bootstrap -----------------------------------------------------------
[tasks.bootstrap]
# Installs all kinds of dependencies
run = [
  "npm ci",
  "mise run e2e-install",
  "mise run hooks-install"
]

[tasks.e2e-install]
description = "Install Playwright browsers and system deps (may prompt for sudo on Linux)"
run         = "cd frontend && npx playwright install --with-deps"

[tasks.hooks-install]
description = "Configure git to use the versioned hooks directory"
run         = "git config core.hooksPath hooks"

# ----- Full-stack dev ------------------------------------------------------
[tasks.dev]
description = "Run front-end"
run         = "cd frontend && npm run dev -- --host"

[tasks.preview]
description = "Run front-end production build in preview mode"
run         = "cd frontend && npm run preview -- --host"

# ----- Build (production artifacts) ---------------------------------------
[tasks.build]
description = "Build front-end"
run = "npm --workspace frontend run build"

# ----- Lint & Type‑check ---------------------------------------------------
[tasks.lint]
description = "Run Biome linter on all source files"
run         = "biome lint frontend/"

[tasks.lint-fix]
description = "Run Biome linter with auto-fix"
run         = "biome lint --write frontend/"

[tasks.typecheck]
description = "Run TypeScript compiler (no emit)"
run         = "tsc -p frontend/jsconfig.json --noEmit"

[tasks.full-lint]
description = "Run Biome linter and TypeScript type check"
run = [
  "mise run lint-fix",
  "mise run typecheck"
]

# ----- Clean ----------------------------------------------------------------
[tasks.clean]
description = "Remove build artifacts"
run         = "rm -rf dist bin"

# ----- E2E / Playwright ----------------------------------------------------
[tasks.e2e]
description = "Run Playwright E2E tests"
run         = "npm --workspace frontend run e2e"

[tasks.e2e-ui]
description = "Run Playwright E2E tests in UI mode"
run         = "npm --workspace frontend run e2e:ui"

[tasks.e2e-file]
description = "Run a single E2E test file: mise run e2e-file tests-e2e/meals.spec.js"
run         = "npm --workspace frontend run e2e -- {{arg(name='file')}}"

[tasks.e2e-report]
description = "Open the latest Playwright HTML report"
run         = "PLAYWRIGHT_HTML_REPORT=1 npm --workspace frontend run e2e"

# ----- Unit tests (Vitest) -------------------------------------------------
[tasks.test-unit]
description = "Run unit tests (Vitest)"
run         = "npm --workspace frontend run test"

[tasks.test-unit-watch]
description = "Run unit tests in watch mode"
run         = "npm --workspace frontend run test:watch"

[tasks.test-unit-file]
description = "Run a single unit test file: mise run test-unit-file src/tests/foo.test.js"
run         = "npm --workspace frontend run test -- {{arg(name='file')}}"

# ----- Unified test entry --------------------------------------------------
[tasks.test]
description = "Run unit tests then E2E tests"
run = [
  "mise run test-unit",
  "mise run e2e"
]
